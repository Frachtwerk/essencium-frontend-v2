openapi: 3.1.0
info:
  title: Essencium API
  contact:
    name: Frachtwerk GmbH
    url: https://github.com/Frachtwerk/essencium-backend
    email: essencium@frachtwerk.de
  version: 3.3.2
servers:
- url: localhost:8098
tags:
- name: AuthenticationController
  description: Set of endpoints used for authentication
- name: RightController
  description: Set of endpoints to manage global application rights / permissions
- name: UserController
  description: "Set of endpoints to manage system users, including yourself"
- name: ContactController
  description: Set of endpoints to send arbitrary emails
- name: ExampleController
  description: Example for implementing openAPI
- name: SentryProxyController
  description: Endpoints to proxy unauthenticated requests from the client to a configured
    Sentry instance
- name: ResetCredentialsController
  description: "Set of endpoints used to reset a user's credentials, given a valid\
    \ reset token as previously received via email"
- name: TranslationController
  description: Set of endpoints to manage language translations / i18n
- name: ApiTokenController
  description: CRUD operations for API tokens
- name: RoleController
  description: Set of endpoints to manage global application roles and their respective
    rights / permissions
paths:
  /v1/users/{id}:
    get:
      tags:
      - UserController
      summary: Retrieve a user by her id
      operationId: findById
      parameters:
      - name: id
        in: path
        description: ID of the user to retrieve
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserRepresentation"
    put:
      tags:
      - UserController
      summary: Update a user by passing the entire object
      operationId: update
      parameters:
      - name: id
        in: path
        description: ID of the user to update
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserRepresentation"
    delete:
      tags:
      - UserController
      summary: Delete a user by her id
      operationId: delete
      parameters:
      - name: id
        in: path
        description: ID of the user to delete
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
    patch:
      tags:
      - UserController
      summary: Update a user by passing individual fields
      operationId: update_1
      parameters:
      - name: id
        in: path
        description: ID of the user to update
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserRepresentation"
  /v1/users/me:
    get:
      tags:
      - UserController
      summary: Retrieve the currently logged-in user
      operationId: getMe
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserRepresentation"
    put:
      tags:
      - UserController
      summary: Update the currently logged-in user by passing the entire update object
      operationId: updateMe
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserRepresentation"
    patch:
      tags:
      - UserController
      summary: Update the currently logged-in user by passing individual fields
      operationId: updateMePartial
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserRepresentation"
  /v1/users/me/password:
    put:
      tags:
      - UserController
      summary: Change the currently logged-in user's password
      operationId: updatePassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordUpdateRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserRepresentation"
  /v1/translations/{locale}:
    get:
      tags:
      - TranslationController
      description: Download all translations for the given locale as a file in the
        given format
      operationId: getTranslationFile
      parameters:
      - name: locale
        in: path
        description: Locale of the translations to retrieve
        required: true
        schema:
          type: string
      - name: type
        in: query
        required: true
        schema:
          type: string
          default: json
          enum:
          - json
          - properties
          - resourcebundle
          - xliff
          - unknown
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
                format: binary
    put:
      tags:
      - TranslationController
      description: Update multiple translation key-value pairs at once
      operationId: updateTranslation
      parameters:
      - name: locale
        in: path
        description: Locale of the translations to update
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Translation"
  /v1/translations/{locale}/{key}:
    put:
      tags:
      - TranslationController
      description: Update an individual translation key-value pair
      operationId: updateSingleTranslation
      parameters:
      - name: locale
        in: path
        description: Locale of the translation to update
        required: true
        schema:
          type: string
      - name: key
        in: path
        description: Key of the translation to update
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Translation"
  /v1/roles/{name}:
    get:
      tags:
      - RoleController
      description: Retrieve a specific role by its name
      operationId: findById_1
      parameters:
      - name: name
        in: path
        description: Name of the role to retrieve
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Role"
    put:
      tags:
      - RoleController
      description: Update a given role by passing an entire update object
      operationId: updateObject
      parameters:
      - name: name
        in: path
        description: Name of the role to be updated
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Role"
    delete:
      tags:
      - RoleController
      description: Delete a given role by its id
      operationId: delete_1
      parameters:
      - name: name
        in: path
        description: Name of the role to be deleted
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
    patch:
      tags:
      - RoleController
      description: Update a given role by passing individual fields
      operationId: update_2
      parameters:
      - name: name
        in: path
        description: Name of the role to be updated
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Role"
  /v1/example/{id}:
    get:
      tags:
      - ExampleController
      operationId: findById_2
      parameters:
      - name: id
        in: path
        description: ID of the entry to retrieve
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExampleRepresentation"
    put:
      tags:
      - ExampleController
      operationId: update_3
      parameters:
      - name: id
        in: path
        description: ID of the entry to update
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExampleEntityDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExampleRepresentation"
    delete:
      tags:
      - ExampleController
      operationId: delete_2
      parameters:
      - name: id
        in: path
        description: ID of the entry to delete
        required: true
        schema:
          type: integer
      responses:
        "204":
          description: No Content
    patch:
      tags:
      - ExampleController
      operationId: update_4
      parameters:
      - name: id
        in: path
        description: ID of the entry to update
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExampleRepresentation"
  /v1/users:
    get:
      tags:
      - UserController
      summary: Find all users according to certain optional filter parameters and
        return them as a page of user representations
      operationId: findAll
      parameters:
      - name: page
        in: query
        description: Page you want to retrieve (0..N)
        required: false
        schema:
          type: integer
          default: 0
      - name: size
        in: query
        description: Number of records per page.
        required: false
        schema:
          type: integer
          default: 20
      - name: sort
        in: query
        description: "Sorting criteria in the format: property(,)(asc|desc). Default\
          \ sort order is ascending. Multiple sort criteria are supported."
        required: false
        schema:
          type: array
          items:
            type: string
      - name: ids
        in: query
        description: "IDs of the requested entities. can contain multiple values separated\
          \ by ','Multiple criteria are supported."
        schema:
          type: array
          items:
            type: integer
        example: "1,2,5"
      - name: createdBy
        in: query
        description: full username (email)
        schema:
          type: string
        example: devnull@frachtwerk.de
      - name: updatedBy
        in: query
        description: full username (email)
        schema:
          type: string
        example: devnull@frachtwerk.de
      - name: createdAtFrom
        in: query
        description: 'returns entries created after the submitted date and time '
        schema:
          type: string
          format: date-time
        example: 2021-01-01T00:00:01
      - name: createdAtTo
        in: query
        description: 'returns entries created before the submitted date and time '
        schema:
          type: string
          format: date-time
        example: 2021-12-31T23:59:59
      - name: updatedAtFrom
        in: query
        description: 'returns entries updated after the submitted date and time '
        schema:
          type: string
          format: date-time
        example: 2021-01-01T00:00:01
      - name: updatedAtTo
        in: query
        description: 'returns entries updated before the submitted date and time '
        schema:
          type: string
          format: date-time
        example: 2021-12-31T23:59:59
      - name: roles
        in: query
        description: A Role ID or name to filter by
        schema:
          type: array
          items:
            type: integer
        example: "1,2,5"
      - name: name
        in: query
        description: A firstName or lastName to filter by
        schema:
          type: string
        example: Peter
      - name: email
        in: query
        description: An email address to filter by
        schema:
          type: string
        example: john.doe@frachtwerk.de
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageUserRepresentation"
    post:
      tags:
      - UserController
      summary: Create a new user
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserDto"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserRepresentation"
  /v1/users/{id}/terminate:
    post:
      tags:
      - UserController
      summary: "Terminate all sessions of the given user, i.e. invalidate her tokens\
        \ to effectively log the user out"
      operationId: terminate
      parameters:
      - name: id
        in: path
        description: ID of the user to terminate
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
  /v1/translations:
    get:
      tags:
      - TranslationController
      description: "Returns all translations grouped by their key, i.e. the returned\
        \ result is a map of translation keys to a list of translations for every\
        \ locale"
      operationId: getTranslationsGroupedByKey
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    $ref: "#/components/schemas/Translation"
    post:
      tags:
      - TranslationController
      summary: Upload a set of translations given by a file.
      description: Update an individual translation key-value pair
      operationId: updateTranslation_1
      parameters:
      - name: locale
        in: query
        required: true
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
          application/json:
            schema:
              $ref: "#/components/schemas/TranslationDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Translation"
  /v1/set-password:
    post:
      tags:
      - ResetCredentialsController
      description: "Update the password of the user, who the given reset token belongs\
        \ to"
      operationId: setNewPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordUpdateRequest"
        required: true
      responses:
        "204":
          description: No Content
  /v1/roles:
    get:
      tags:
      - RoleController
      description: "List all available roles, including their rights"
      operationId: findAll_1
      parameters:
      - name: page
        in: query
        description: Page you want to retrieve (0..N)
        required: false
        schema:
          type: integer
          default: 0
      - name: size
        in: query
        description: Number of records per page.
        required: false
        schema:
          type: integer
          default: 20
      - name: sort
        in: query
        description: "Sorting criteria in the format: property(,)(asc|desc). Default\
          \ sort order is ascending. Multiple sort criteria are supported."
        required: false
        schema:
          type: array
          items:
            type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageRole"
    post:
      tags:
      - RoleController
      description: Create a new role
      operationId: create_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleDto"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Role"
  /v1/reset-credentials:
    post:
      tags:
      - ResetCredentialsController
      description: Request a new reset token via email
      operationId: requestResetToken
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        "204":
          description: No Content
  /v1/example:
    get:
      tags:
      - ExampleController
      operationId: findAll_2
      parameters:
      - name: page
        in: query
        description: Page you want to retrieve (0..N)
        required: false
        schema:
          type: integer
          default: 0
      - name: size
        in: query
        description: Number of records per page.
        required: false
        schema:
          type: integer
          default: 20
      - name: sort
        in: query
        description: "Sorting criteria in the format: property(,asc|desc). Default\
          \ sort order is ascending. Multiple sort criteria are supported."
        required: false
        schema:
          type: array
          items:
            type: string
      - name: ids
        in: query
        description: "IDs of the requested entities. can contain multiple values separated\
          \ by ','Multiple criteria are supported."
        schema:
          type: array
          items:
            type: integer
        example: "1,2,5"
      - name: createdBy
        in: query
        description: full username (email)
        schema:
          type: string
        example: devnull@frachtwerk.de
      - name: updatedBy
        in: query
        description: full username (email)
        schema:
          type: string
        example: devnull@frachtwerk.de
      - name: createdAtFrom
        in: query
        description: 'returns entries created after the submitted date and time '
        schema:
          type: string
          format: date-time
        example: 2021-01-01T00:00:01
      - name: createdAtTo
        in: query
        description: 'returns entries created before the submitted date and time '
        schema:
          type: string
          format: date-time
        example: 2021-12-31T23:59:59
      - name: updatedAtFrom
        in: query
        description: 'returns entries updated after the submitted date and time '
        schema:
          type: string
          format: date-time
        example: 2021-01-01T00:00:01
      - name: updatedAtTo
        in: query
        description: 'returns entries updated before the submitted date and time '
        schema:
          type: string
          format: date-time
        example: 2021-12-31T23:59:59
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageExampleRepresentation"
    post:
      tags:
      - ExampleController
      operationId: create_2
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExampleEntityDto"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExampleRepresentation"
  /v1/contact:
    post:
      tags:
      - ContactController
      description: "As a logged in user, send a certain message to the given address"
      operationId: sendContactRequest
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequestDto"
        required: true
      responses:
        "200":
          description: OK
  /v1/api-tokens:
    get:
      tags:
      - ApiTokenController
      summary: Get paginated list of API tokens owned by the current user
      description: Returns a paginated list of API tokens. Access is restricted to
        tokens owned by the current user.
      operationId: findAll_3
      parameters:
      - name: page
        in: query
        description: Page you want to retrieve (0..N)
        required: false
        schema:
          type: integer
          default: 0
      - name: size
        in: query
        description: Number of records per page.
        required: false
        schema:
          type: integer
          default: 20
      - name: sort
        in: query
        description: "Sorting criteria in the format: property(,asc|desc). Default\
          \ sort order is ascending. Multiple sort criteria are supported."
        required: false
        schema:
          type: array
          items:
            type: string
      - name: ids
        in: query
        description: "IDs of the requested entities. can contain multiple values separated\
          \ by ','Multiple criteria are supported."
        schema:
          type: array
          items:
            type: integer
        example: "1,2,5"
      - name: createdBy
        in: query
        description: full username (email)
        schema:
          type: string
        example: devnull@frachtwerk.de
      - name: updatedBy
        in: query
        description: full username (email)
        schema:
          type: string
        example: devnull@frachtwerk.de
      - name: createdAtFrom
        in: query
        description: 'returns entries created after the submitted date and time '
        schema:
          type: string
          format: date-time
        example: 2021-01-01T00:00:01
      - name: createdAtTo
        in: query
        description: 'returns entries created before the submitted date and time '
        schema:
          type: string
          format: date-time
        example: 2021-12-31T23:59:59
      - name: updatedAtFrom
        in: query
        description: 'returns entries updated after the submitted date and time '
        schema:
          type: string
          format: date-time
        example: 2021-01-01T00:00:01
      - name: updatedAtTo
        in: query
        description: 'returns entries updated before the submitted date and time '
        schema:
          type: string
          format: date-time
        example: 2021-12-31T23:59:59
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageApiTokenRepresentation"
    post:
      tags:
      - ApiTokenController
      summary: Create a new API token
      operationId: create_3
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiTokenDto"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiTokenRepresentation"
  /sentry/feedback:
    post:
      tags:
      - SentryProxyController
      description: Sends to Sentry a user feedback request
      operationId: sendFeedback
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Feedback"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Feedback"
  /auth/token:
    post:
      tags:
      - AuthenticationController
      summary: Login with username and password
      description: Log in to request a new JWT token using username and password
      operationId: postLogin
      parameters:
      - name: User-Agent
        in: header
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TokenResponse"
  /auth/renew:
    post:
      tags:
      - AuthenticationController
      summary: Renew access token
      description: "Request a new JWT access token, given a valid refresh token"
      operationId: postRenew
      parameters:
      - name: User-Agent
        in: header
        required: true
        schema:
          type: string
      - name: refreshToken
        in: cookie
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TokenResponse"
  /auth/logout:
    post:
      tags:
      - AuthenticationController
      summary: Logout the currently logged-in user
      operationId: logout
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: redirectUrl
        in: query
        description: URL to redirect to after logout
        required: false
        schema:
          type: string
          format: uri
          example: https://example.com/logout
      responses:
        "200":
          description: OK
  /v1/api-tokens/{id}:
    get:
      tags:
      - ApiTokenController
      summary: Get API token by ID
      description: Returns the API token with the specified ID. Access is restricted
        to tokens owned by the current user.
      operationId: findById_3
      parameters:
      - name: id
        in: path
        description: ID of the entry to retrieve
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiTokenRepresentation"
    delete:
      tags:
      - ApiTokenController
      summary: Delete an API token by ID (admin only)
      description: Deletes the API token with the specified ID. Admin access (API_TOKEN_ADMIN)
        required.
