# Standalone compose for the Essencium v2 frontend.
# Build & run:   docker compose up --build
# The app is served at http://localhost:3000 and proxies /api → BACKEND_URL.
services:
  frontend:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        # Client env baked into the bundle at build time.
        VITE_API_URL: /api
        VITE_APP_ENV: production
    image: essencium-frontend-v2:local
    restart: unless-stopped
    ports:
      - '3000:8080'
    environment:
      # Runtime target for the /api reverse proxy. Override to point at your
      # backend, e.g. http://host.docker.internal:8098 for a backend on the host,
      # or a service name when running the backend in the same compose network.
      BACKEND_URL: http://host.docker.internal:8098
    extra_hosts:
      - 'host.docker.internal:host-gateway'
